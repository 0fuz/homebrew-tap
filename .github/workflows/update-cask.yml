name: Update cask

# Keeps Casks/ssh-tunnel-manager.rb in sync with the latest app release.
# Runs daily, and can be run on demand from the Actions tab right after a
# release. Pushes to this repo with the built-in GITHUB_TOKEN, so no extra
# secret or PAT is needed.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync cask to the latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="0fuz/ssh-tunnel-manager"
          CASK="Casks/ssh-tunnel-manager.rb"

          TAG=$(gh api "repos/$REPO/releases/latest" --jq .tag_name)
          VERSION="${TAG#v}"
          CURRENT=$(grep -E '^[[:space:]]*version[[:space:]]+"' "$CASK" | sed -E 's/.*"([^"]+)".*/\1/')

          echo "latest release: $VERSION | cask has: $CURRENT"
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "Already up to date."
            exit 0
          fi

          URL="https://github.com/$REPO/releases/download/$TAG/SSHTunnelManager.dmg"
          curl -fsSL "$URL" -o app.dmg
          SHA=$(sha256sum app.dmg | awk '{print $1}')
          rm -f app.dmg

          sed -i -E "s|^([[:space:]]*version[[:space:]]+\").*(\")|\1${VERSION}\2|" "$CASK"
          sed -i -E "s|^([[:space:]]*sha256[[:space:]]+\").*(\")|\1${SHA}\2|" "$CASK"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK"
          git commit -m "Update ssh-tunnel-manager to ${VERSION}"
          git push
